<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zota</title>
    <style>
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0b1220; color: #fff; }
      .wrap { min-height: 100vh; display: grid; place-items: center; text-align: center; padding: 24px; }
      .card { max-width: 520px; border: 1px solid rgba(255,255,255,.2); border-radius: 14px; padding: 20px; background: rgba(255,255,255,.06); }
      h1 { margin: 0 0 10px; font-size: 24px; }
      p { margin: 0; opacity: .85; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Zota</h1>
        <p>This mobile app is configured to load the web experience from a server URL.</p>
      </div>
    </div>
  </body>
</html>
